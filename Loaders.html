<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loaders — Elegant B&W</title>
<style>
  body { margin: 0; background: #fafaf9; font-family: 'Inter', -apple-system, sans-serif; color: #0a0a0a; }
  .canvas-page { padding: 60px 40px; }
  .canvas-header { max-width: 1200px; margin: 0 auto 48px; }
  .canvas-header h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 48px; font-weight: 400; letter-spacing: -0.02em; margin: 0 0 12px; }
  .canvas-header p { font-size: 14px; color: #6b6b6b; max-width: 560px; line-height: 1.7; margin: 0; letter-spacing: 0.01em; }
  .canvas-meta { display: flex; gap: 32px; margin-top: 28px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.12em; }
  .canvas-meta span strong { color: #0a0a0a; font-weight: 500; }

  .loader-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #e5e5e5;
    border: 1px solid #e5e5e5;
  }
  .loader-cell {
    background: #fafaf9;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.4s ease;
  }
  .loader-cell:hover { background: #f5f5f4; }
  .loader-cell::before {
    content: attr(data-num);
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #b8b8b8;
    letter-spacing: 0.1em;
  }
  .loader-cell::after {
    content: attr(data-name);
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .loader-frame {
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 900px) {
    .loader-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 620px) {
    .loader-grid { grid-template-columns: 1fr; }
    .canvas-page { padding: 40px 20px; }
    .canvas-header h1 { font-size: 36px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="loaders.jsx"></script>
<script type="text/babel">
  const LOADERS = [
    { num: '01', name: 'Ink Bloom',       Comp: InkBloom },
    { num: '02', name: 'Breathing Orbit', Comp: BreathingOrbit },
    { num: '03', name: 'Drifting Dots',   Comp: DriftingDots },
    { num: '04', name: 'Veiled Arc',      Comp: VeiledArc },
    { num: '05', name: 'Ripple Grid',     Comp: RippleGrid },
    { num: '06', name: 'Smoke Trail',     Comp: SmokeTrail },
    { num: '07', name: 'Shifting Square', Comp: ShiftingSquare },
    { num: '08', name: 'Pendulum Pulse',  Comp: PendulumPulse },
    { num: '09', name: 'Breathing Lines', Comp: BreathingLines },
  ];

  function App() {
    return (
      <div className="canvas-page">
        <div className="canvas-header">
          <h1>Loading, Quietly.</h1>
          <p>Nine indeterminate loaders — black on warm off-white, each evoking a natural, hazy presence. No spinners, no text, only motion that breathes.</p>
          <div className="canvas-meta">
            <span><strong>9</strong> variants</span>
            <span><strong>200×200</strong> px</span>
            <span><strong>SVG</strong> + canvas</span>
            <span><strong>Indeterminate</strong></span>
          </div>
        </div>
        <div className="loader-grid">
          {LOADERS.map(L => (
            <div key={L.num} className="loader-cell" data-num={L.num} data-name={L.name}>
              <L.Comp />
            </div>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
